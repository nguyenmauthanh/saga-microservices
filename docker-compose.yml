version: "3.9"

# ============================================================
# Saga Microservices — 3-Step Orchestration Saga Demo
#
# Demonstrates: E-Commerce Order Fulfillment (used by Shopee, Lazada, Amazon)
#   Step 1: RESERVE inventory  (inventory-service)
#   Step 2: FRAUD_CHECK        (fraud-check-service)  ← NEW
#   Step 3: CHARGE payment     (payment-service)
#
# 4 demo outcomes (see demo.sh):
#   A. Happy path        — all 3 steps succeed         → ORDER_COMPLETED
#   B. Out of stock      — step 1 fails                → OUT_OF_STOCK
#   C. Fraud detected    — step 2 fails, compensate step 1  → FRAUD_DECLINED
#   D. Payment declined  — step 3 fails, compensate steps 1+2 → PAYMENT_DECLINED
#
# Usage:
#   mvn package -DskipTests
#   docker compose up --build -d
#   bash demo.sh
#
# Ports:
#   Order Service:        http://localhost:8081/swagger-ui.html
#   Inventory Service:    http://localhost:8082/swagger-ui.html
#   Fraud Check Service:  http://localhost:8084/swagger-ui.html
#   Payment Service:      http://localhost:8083/swagger-ui.html
#   Kafka UI:             http://localhost:8090
#   PostgreSQL:           localhost:5432
# ============================================================

services:

  # ── Zookeeper ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka Broker ───────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Kafka UI ───────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: saga-microservices
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: saga
      POSTGRES_PASSWORD: saga123
    volumes:
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saga"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Order Service (Saga Orchestrator) ──────────────────────
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/order_db
      SPRING_DATASOURCE_USERNAME: saga
      SPRING_DATASOURCE_PASSWORD: saga123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Inventory Service (Saga Participant — Step 1) ───────────
  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/inventory_db
      SPRING_DATASOURCE_USERNAME: saga
      SPRING_DATASOURCE_PASSWORD: saga123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Fraud Check Service (Saga Participant — Step 2) ─────────
  # Simulated rules:
  #   customerId contains "fraud" → DECLINED
  #   amount >= 2000              → DECLINED
  fraud-check-service:
    build:
      context: ./fraud-check-service
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fraud_db
      SPRING_DATASOURCE_USERNAME: saga
      SPRING_DATASOURCE_PASSWORD: saga123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8084/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Payment Service (Saga Participant — Step 3) ─────────────
  # Simulated rules:
  #   customerId contains "declined" → DECLINED
  #   amount >= 5000                 → DECLINED
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment_db
      SPRING_DATASOURCE_USERNAME: saga
      SPRING_DATASOURCE_PASSWORD: saga123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
